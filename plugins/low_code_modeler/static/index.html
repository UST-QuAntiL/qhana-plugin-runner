<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Low-Code Modeler</title>
    <meta name="description" content="Model quantum algorithms" />
    <meta name="theme-color" content="#ffffff" />
    <script type="module" crossorigin src="./assets/index-f17db7d3.js"></script>
<script defer src="/static/microfrontend.js"></script><script src="workarounds.js"></script>
    <link rel="stylesheet" href="./assets/index-80aaee7b.css">
  <link rel="manifest" href="./manifest.webmanifest"></head>
    <link rel="stylesheet" type="text/css" href="/static/forms.css" media="screen" />
<link href="http://127.0.0.1:8080/styles.f605019a8cc03494.css" rel="stylesheet">
<style>
    body {
        margin: 0px;
	color: black;
	background: white;
    }

    .content {
        width: 100%;
        height: calc(100vh - 1rem);
        padding-block: 0.5rem;
        position: relative;
        background-color: white;
        color: black;
    }

    .workflow-list {
        max-height: 50vh;
        overflow-y: auto;
        scrollbar-gutter: stable;
        margin-block-end: 1rem;
    }

    .workflow-item {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-items: center;
        justify-content: space-between;
    }

    .workflow-item:not(:nth-child(1)) {
        border-top: 1px solid var(--border-color, gray);
    }

    .workflow-title {
        font-weight: 600;
        font-size: 120%;
        margin-block: 0.1em;
    }

    .workflow-subtitle {
        margin-block: 0.1em;
    }

    dialog {
	margin: revert;
    }

</style>
  <body>
    <div id="root"></div>
    

    <dialog class="card mat-mdc-card color-scheme-card" id="openWF" closedby="any" autofocus>
        <h2>Open Workflow</h2>
        <form method="dialog" class="qhana-form">
            <div class="qhana-form-field">
                <label class="qhana-form-label" for="openWFinput">Open Workflow from local filesystem:</label>
                <div class="qhana-input-wrapper">
                    <input class="qhana-form-input" type="file" name="workflow" id="openWFinput" accept="bpmn" required>
                    <button class="qhana-form-submit" type="submit" value="openLocal">Open selected workflow</button>
                </div>
            </div>
        </form>
        <h3>Load Saved Workflow</h3>
        <form method="dialog" id="openExisting" class="qhana-form">
            <div class="workflow-list">
            </div>
        </form>
        <div id="experimentWorkflows">
            <h3>Load Workflow from current Experiment</h3>
            <form method="dialog" id="openExisting" class="qhana-form">
                <div class="workflow-list">
                </div>
            </form>
        </div>
        <form method="dialog" class="qhana-form">
            <button class="cancel-dialog qhana-form-submit" type="submit" value="cancel">Close dialog</button>
        </form>
    </dialog>

    <dialog class="card mat-mdc-card color-scheme-card" id="deployWF" closedby="any">
        <h2>Deploy Workflow</h2>
        <form method="dialog" class="qhana-form">
            <button class="qhana-form-submit" type="submit" value="cancel" autofocus>Cancel</button>
            <button class="qhana-form-submit" type="submit" value="deployPlugin">Deploy as Plugin</button>
            <button class="qhana-form-submit" type="submit" value="deployWorkflow">Deploy as Workflow</button>
        </form>
    </dialog>
    <script>
        let currentRestoreFlow = null;

        document.addEventListener("lcm-save", (event) => {
  	  event.preventDefault();
  	  const flowWithMetadata = event.detail;
  	  console.log("recieved:", flowWithMetadata);
  	  fetch(
  	      "../models/",
  	      {
  		  method: "post",
  		  body: JSON.stringify(flowWithMetadata),
  		  headers: {
  		      "Content-Type": "application/json"
  		  },
  	      }
  	  );
        });

        document.addEventListener("lcm-open", (event) => {
  	  event.preventDefault();
  	  currentRestoreFlow = event.detail.restoreFlow;
  	  console.log("received restoreFlow function");
  	  onFileOpenRequest();
        });

        
        function onFileOpenRequest() {
            const dialogElement = document.querySelector("dialog#openWF");
            const url = "../models/";
            fetch(url).then(response => response.json()).then(result => {
		console.log("Received models from backend:", result);
                const container = document.querySelector("form#openExisting .workflow-list");

                const newChildren = result.map(model => {
		    console.log("Processing model:", model);
		    
		    const metadata = model.metadata || model;
                    const modelId = model.metadata ? model.metadata.id : model.model_id;                          
                    const outer = document.createElement("div");
                    outer.classList.add("workflow-item")
                    const inner = document.createElement("div");
                    const title = document.createElement("p");
                    title.classList.add("workflow-title");
                    title.textContent = `${metadata.name} – ${metadata.id}@${metadata.version}`;
                    const subtitle = document.createElement("p");
                    subtitle.classList.add("workflow-subtitle");
                    const date = new Date(metadata.date)
                    subtitle.textContent = date.toLocaleString();
                    const button = document.createElement("button");
                    button.setAttribute("value", `load:${modelId}`);
                    button.setAttribute("type", "submit");
                    button.classList.add("qhana-form-submit");
                    button.textContent = `Load ${metadata.name}`;
                    inner.appendChild(title);
                    inner.appendChild(subtitle);
                    outer.appendChild(inner);
                    outer.appendChild(button);
                    return outer;
                });

                container.replaceChildren(...newChildren);
            });
            dialogElement.showModal();
        }

        function onOpenDialogClosed(event) {
            const localWFInput = event.target.querySelector("input#openWFinput");
            if (event.target.returnValue === "openLocal") {
                if (localWFInput.files.length === 1) {
                    const file = localWFInput.files[0];
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const modelData = JSON.parse(e.target.result);
                            if (currentRestoreFlow) {
                                currentRestoreFlow(modelData);
                            }
                        } catch (error) {
                            console.error("Error parsing model file:", error);
                        }
                    };
                    reader.readAsText(file);
                }
            }
            localWFInput.value = "";
            if (event.target.returnValue === "cancel") {
                return;
            }
            if (event.target.returnValue.startsWith("load:")) {
                const model_id = event.target.returnValue.substring(5);
                const url = `../models/${model_id}/`
                fetch(url).then(response => {
                    if (response.status === 200) {
                        return response.json();
                    } else {
                        throw Error("Could not load model!");
                    }
                }).then(modelData => {
                    if (currentRestoreFlow) {
                        currentRestoreFlow(modelData);
                    }
                });
            }
        }

        document.querySelector("dialog#openWF").addEventListener("close", onOpenDialogClosed);
      </script>
  </body>
</html>
